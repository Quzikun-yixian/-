<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南科大选课投分计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        label {
            color: #555;
            font-size: 14px;
            flex: 1;
        }
        
        input, select {
            width: 120px;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .result-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            text-align: center;
        }
        
        .result-title {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .result-item {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            gap: 20px;
        }
        
        .result-label {
            font-size: 18px;
            font-weight: bold;
            width: 40px;
        }
        
        .result-value {
            font-size: 32px;
            font-weight: bold;
            min-width: 80px;
        }
        
        .chong { color: #e74c3c; }
        .wen { color: #f39c12; }
        .bao { color: #27ae60; }
        
        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 南科大选课投分计算器</h1>
        
        <div class="input-group">
            <label>总分</label>
            <input type="number" id="total_score" value="150" min="0">
        </div>
        
        <div class="input-group">
            <label>期望系数 (0-1)</label>
            <input type="number" id="desire" value="0.9" min="0" max="1" step="0.1">
        </div>
        
        <div class="input-group">
            <label>课程容量</label>
            <input type="number" id="capacity" value="40" min="1">
        </div>
        
        <div class="input-group">
            <label>已选人数</label>
            <input type="number" id="selected" value="50" min="0">
        </div>
        
        <div class="input-group">
            <label>开设班次</label>
            <input type="number" id="offered" value="1" min="1">
        </div>
        
        <div class="input-group">
            <label>教师评价 (1-10)</label>
            <input type="number" id="teacher" value="10" min="1" max="10" step="0.5">
        </div>
        
        <div class="input-group">
            <label>给分好坏 (1-10)</label>
            <input type="number" id="grading" value="10" min="1" max="10" step="0.5">
        </div>
        
        <div class="input-group">
            <label>内容质量 (1-10)</label>
            <input type="number" id="content" value="10" min="1" max="10" step="0.5">
        </div>
        
        <div class="input-group">
            <label>热度趋势 (0.5-1.5)</label>
            <input type="number" id="trend" value="1.2" min="0.5" max="1.5" step="0.1">
        </div>
        
        <div class="input-group">
            <label>课程类型</label>
            <select id="course_type">
                <option value="core">专业核心课</option>
                <option value="basic">专业基础课</option>
                <option value="general_core">通识基础课</option>
                <option value="elective">专业选修课</option>
                <option value="general_elective" selected>通识选修课</option>
            </select>
        </div>
        
        <div class="result-box">
            <div class="result-title">投分区间</div>
            <div class="result-item">
                <span class="result-label bao">保</span>
                <span class="result-value bao" id="res-bao">0</span>
            </div>
            <div class="result-item">
                <span class="result-label wen">稳</span>
                <span class="result-value wen" id="res-wen">0</span>
            </div>
            <div class="result-item">
                <span class="result-label chong">冲</span>
                <span class="result-value chong" id="res-chong">0</span>
            </div>
        </div>
        
        <div class="hint">冲=低分试试 | 稳=正常投入 | 保=高分确保</div>
    </div>

    <script>
        const TYPE_MAP = {
            "core": "core",
            "basic": "basic",
            "general_core": "general_core",
            "elective": "elective",
            "general_elective": "general_elective"
        };

        function calculate() {
            const total_score = parseFloat(document.getElementById('total_score').value) || 0;
            const desire = parseFloat(document.getElementById('desire').value) || 0;
            const capacity = parseInt(document.getElementById('capacity').value) || 1;
            const selected = parseInt(document.getElementById('selected').value) || 0;
            const offered = parseInt(document.getElementById('offered').value) || 1;
            const teacher = parseFloat(document.getElementById('teacher').value) || 5;
            const grading = parseFloat(document.getElementById('grading').value) || 5;
            const content = parseFloat(document.getElementById('content').value) || 5;
            const trend = parseFloat(document.getElementById('trend').value) || 1;
            const course_type = document.getElementById('course_type').value;

            const R = selected / capacity;

            const type_base = {
                "core": 1,
                "basic": 1.1,
                "general_core": 1.1,
                "elective": 0.85,
                "general_elective": 0.9
            }[course_type] || 0.5;

            const I_raw = type_base * (1 + 5 / Math.max(offered, 1));
            const I = Math.min(I_raw / 3, 1.0);

            const H_raw = ((teacher + grading + content) / 30) * trend;
            const H = Math.min(Math.max(H_raw, 0), 1.5);

            let base_score;
            if (R <= 1) {
                base_score = 1.0;
            } else {
                base_score = 1.0 + (Math.pow(4, R - 1) - 1) * 40;
                base_score = Math.min(base_score, total_score * 0.5);
            }

            const quality_factor = 0.8 + H * 0.15;
            base_score = base_score * quality_factor;

            const type_factor = {
                "core": 1,
                "basic": 1.1,
                "general_core": 1.1,
                "elective": 0.85,
                "general_elective": 0.9
            }[course_type] || 1.0;
            base_score = base_score * type_factor;

            base_score = Math.max(1.0, Math.min(base_score, total_score * 1));

            const mid = base_score;

            const chong_factor = Math.max(0.5, desire * 0.5);
            let low = base_score * chong_factor;
            low = Math.max(1.0, low);

            const desire_bonus = total_score * (0.02 * R) * Math.pow(desire + 1, 1.1);
            let high = base_score + desire_bonus;
            high = Math.min(high, total_score);

            low = Math.min(low, mid);
            high = Math.max(high, mid);

            document.getElementById('res-chong').textContent = low.toFixed(1);
            document.getElementById('res-wen').textContent = mid.toFixed(1);
            document.getElementById('res-bao').textContent = high.toFixed(1);
        }

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', calculate);
        });

        calculate();
    </script>
</body>
</html>
